<div class="container mt-5">

  <div class="card shadow rounded-4 p-4 mx-auto" style="max-width: 600px;">

    <h3 class="mb-4 text-center">Create Task</h3>

    <form [formGroup]="form">

      <!-- Title -->
      <div class="mb-3">
        <label class="form-label">Title</label>
        <input type="text"
               class="form-control"
               [class.is-valid]="title.touched && title.valid"
               [class.is-invalid]="title.touched && title.invalid"
               placeholder="Enter task title"
               formControlName="title">

        @if(title.hasError('required')) {
            <div class="invalid-feedback">
                Title is required
            </div>
        }
      </div>

        <!-- User -->
      <div class="mb-3">
            <label class="form-label">User</label>

            <select class="form-select" 
                    [class.is-valid]="userId.touched && userId.valid"
                    [class.is-invalid]="userId.touched && userId.invalid"
                    formControlName="userId">
            <option selected disabled value="">Select user</option>
            @for(user of usersList(); track user.id) {
                <option [value]="user.id">{{user.userName}}</option>
            }
            </select>

            @if(userId.hasError('required')) {
                <div class="invalid-feedback">
                    User is required
                </div>
            }
      </div>

      <!-- Description -->
      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea class="form-control"
                  [class.is-valid]="description.touched && description.valid"
                  [class.is-invalid]="description.touched && description.invalid"
                  rows="3"
                  placeholder="Enter task description"
                  formControlName="description"></textarea>

        @if(description.hasError('required')) {
            <div class="invalid-feedback">
                Description is required
            </div>
        }
      </div>

      <!-- Buttons -->
      <div class="d-flex justify-content-end gap-2 mt-4">
        <button type="button" class="btn btn-outline-secondary" (click)="cancel()">
          Cancel
        </button>

        <app-loading-button lable="submit" [loading]="submitting()" (clicked)="submit()" />
      </div>

    </form>

  </div>

</div>
