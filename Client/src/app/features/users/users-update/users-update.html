<div class="container mt-5">

  <div class="card shadow rounded-4 p-4 my-5 mx-auto" style="max-width: 800px;">

    <h3 class="mb-4 text-center">Update User</h3>

    <form [formGroup]="form">

      <div class="mb-3">

        <label class="form-label">Permissions</label>

        <select class="form-select"
                formControlName="permissions"
                multiple
                style="height: 200px;"
                [class.is-valid]="permissions.valid && permissions.touched"
                >

            @for(permission of permissionsValues(); track permission) {
                <option [value]="permission">
                    {{ permission | permission }}
                </option>
            }
        </select>
        </div>

      <!-- Buttons -->
      <div class="d-flex justify-content-end gap-2">
        <button type="button" class="btn btn-outline-secondary" (click)="cancel()">
          Cancel
        </button>

        <app-loading-button lable="Submit" [loading]="submitting()" (clicked)="submit()" />
      </div>

    </form>

  </div>

</div>
