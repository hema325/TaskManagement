<div class="container vh-100 d-flex align-items-center justify-content-center">
  <div class="card shadow p-4" style="width: 100%; max-width: 400px;">

    <div class="text-center mb-4">
      <h3 class="fw-bold">Sign In</h3>
      <p class="text-muted">Enter your credentials</p>
    </div>

    <form [formGroup]="form">
      <!-- Username -->
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" [class.is-invalid]="userName.invalid && userName.touched" placeholder="Enter username" formControlName="userName">
        @if(userName.hasError("required")) {
            <div class="invalid-feedback">
                Username is required
            </div>
        }
      </div>

      <!-- Password -->
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" [class.is-invalid]="password.invalid && password.touched" placeholder="Enter password" formControlName="password">
        @if(password.hasError("required")) {
            <div class="invalid-feedback">
                Password is required
            </div>
        }
    </div>

      <app-loading-button btnClass="btn btn-primary w-100" lable="Login" [loading]="submitting()" (clicked)="login()"/>
    </form>

  </div>
</div>
