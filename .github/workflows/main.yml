name: CI/CD

on:
   workflow_dispatch:
   push:
     branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: checkout code
      uses: actions/checkout@v6.0.2

    - name: setup dotnet
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0

    - name: restore, build, and publish
      run: |
        dotnet restore TaskManagement/TaskManagement.csproj
        dotnet build TaskManagement/TaskManagement.csproj
        dotnet publish TaskManagement/TaskManagement.csproj -o publish

    - name: upload published files to artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-artifact
        path: /TaskManagement/publish
        retention-days: 1 
    
