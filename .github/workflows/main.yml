name: CI/CD 

on:
   workflow_dispatch:
   push:
     branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: checkout code
      uses: actions/checkout@v6.0.2

    - name: setup dotnet
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0

    - name: restore, build, and publish
      run: |
        dotnet restore TaskManagement/TaskManagement.csproj
        dotnet build TaskManagement/TaskManagement.csproj -c Release --no-restore

  publish:
     needs: build
     runs-on: ubuntu-latest

     steps:
        - name: checkout code
          uses: actions/checkout@v6.0.2

        - name: docker login
          uses: docker/login-action@v4.0.0
          with:
            username: ${{secrets.DOCKERUSER}}
            password: ${{secrets.DOCKERPASSWORD}}

        - name: build and push the image
          run: |
             docker compose build
             docker compose push
             
  deploy:
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v6.0.2

      - name: docker login
        uses: docker/login-action@v4.0.0
        with:
          username: ${{secrets.DOCKERUSER}}
          password: ${{secrets.DOCKERPASSWORD}}


      - name: Execute SSH commands
        uses: appleboy/ssh-action@v1.0.3
        with:
           host: ${{ secrets.SSH_HOST }}
           username: ${{ secrets.SSH_USER }}
           key: ${{ secrets.SSH_PRIVATE_KEY }}
           script: |
            cd /home/hema/Projects/TaskManagement
            docker compose down
            docker compose pull
            docker compose up



    
